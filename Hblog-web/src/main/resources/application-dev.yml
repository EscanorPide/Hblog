spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&zeroDateTimeBehavior=convertToNull
    username: root
    password: 12345678
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: Weblog-HikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

jwt:
  # 签发人
  issuer: hehaoran
  # Base64 编码后的秘钥（可用 JwtTokenHelper#main 重新生成）
  secret: niHZYRzX0KJ8tHtr8eteN0tvunpTvhPNnXzSBUQ+J4SvfD8E+nr1/n5jKNVjmKaMh/OLxX6z/L760yeifnIc2A==
  # token 过期时间（单位：分钟） 24*60
  tokenExpireTime: 1440
  # token 请求头中的 key 值
  tokenHeaderKey: Authorization
  # token 请求头中的 value 值前缀
  tokenPrefix: Bearer

logging:
  config: classpath:logback-Hblog.xml
  level:
    com.hehaoran.hblog.common.domain.mapper: debug

# ==================== RustFS（S3 兼容对象存储） ====================
# 说明：RustFS 没有专用 Java SDK，通过 AWS S3 SDK 对接
rustfs:
  # RustFS 服务地址（控制台/API 地址，不要末尾斜杠）
  endpoint: http://124.222.230.228:9000
  # Access Key / Secret Key：在 RustFS 控制台创建
  access-key: rustfsadmin
  secret-key: rustfsadmin
  # 桶名称：先在控制台建好（只能小写字母、数字、连字符）
  bucket-name: hblog
  # Region：RustFS 不校验，但 SDK 必填，随便填一个即可
  region: us-east-1
  # 必须为 true（path-style），否则上传常会失败
  path-style-access: true
  url-prefix: http://124.222.230.228:9000/hblog
#=================================================================
# Lucene 全文检索
#=================================================================
lucene:
  indexDir: E:\\java_workspace\\lucene-index # lucene 索引存放的位置

